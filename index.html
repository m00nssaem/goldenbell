<script type="module">
/* =========================================================================

import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp, doc, updateDoc,
  deleteDoc, setDoc, query, where, orderBy, onSnapshot, getDocs, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------------- Firebase 초기화 ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyBtqEv1-RNiqKH7m3fLSxeeKUbcXtEzJSM",
  authDomain: "goldenbell-questionbank.firebaseapp.com",
  projectId: "goldenbell-questionbank",
  storageBucket: "goldenbell-questionbank.firebasestorage.app",
  messagingSenderId: "119679548211",
  appId: "1:119679548211:web:bc372dd28e64a7292c1c46",
};
const fbApp = getApps().length ? getApp() : initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ---------------- 전역 상수 ---------------- */
const SUBJECTS = ["국어", "영어", "수학", "사회", "과학", "역사", "기타"];
const CLASSES = ["1반", "2반", "3반", "4반", "5반", "6반"];
const QUESTION_TYPES = { MULTIPLE: "객관식", ESSAY: "서술형" };
const CHOICE_COUNT = 4;
const ADMIN_PIN = "2026gwon5";
const REVEAL_MODES = { FULL_NAME: "실명 공개", NAME_ONLY: "이름만 공개", ANONYMOUS: "익명", AFTER_ANSWER: "정답 공개 후 표시" };
const TIMER_OPTIONS = [{ label: "제한 없음", value: null }, { label: "10초", value: 10 }, { label: "20초", value: 20 }, { label: "30초", value: 30 }];
const DEFAULT_QUESTION_COUNT = 20;
const COLLECTIONS = { QUESTIONS: "questions", SETTINGS: "settings" };
const STORAGE_KEYS = { STUDENT_DRAFT: "goldenbell_student_draft", STUDENT_INFO: "goldenbell_student_info" };
const ACTIVE_QUIZ_KEY = "goldenbell_active_quiz";
const ADMIN_AUTH_KEY = "goldenbell_admin_auth";
const SUBMITTED_KEY = "goldenbell_submitted_subjects_v1";

const BAD_WORDS = ["시발","씨발","ㅅㅂ","ㅆㅂ","병신","ㅄ","개새끼","새끼","좆","지랄","닥쳐","미친놈","미친년","꺼져","죽어","fuck","shit","bitch"];

/* ---------------- 유틸: localStorage / sessionStorage ---------------- */
function loadJSON(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }
function removeKey(key) { try { localStorage.removeItem(key); } catch (e) {} }
function loadSession(key, fallback) {
  try { const raw = sessionStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function saveSession(key, value) { try { sessionStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------------- 금지어 검사 ---------------- */
function containsBadWord(text) {
  if (!text) return false;
  const normalized = text.toLowerCase().replace(/\s/g, "");
  return BAD_WORDS.some((w) => normalized.includes(w.toLowerCase()));
}
function isRepeatedChar(text) {
  const cleaned = text.replace(/\s/g, "");
  if (cleaned.length < 4) return false;
  const counts = {};
  for (const ch of cleaned) counts[ch] = (counts[ch] || 0) + 1;
  const maxCount = Math.max(...Object.values(counts));
  return maxCount / cleaned.length >= 0.6;
}
function isSpecialCharOnly(text) {
  const cleaned = text.replace(/\s/g, "");
  if (!cleaned) return true;
  return !/[가-힣a-zA-Z0-9]/.test(cleaned);
}

/* ---------------- 검증 ---------------- */
function validateStudentInfo({ studentClass, number, name }) {
  if (!studentClass) return { valid: false, message: "반을 선택해주세요." };
  if (!number || !String(number).trim()) return { valid: false, message: "번호를 입력해주세요." };
  if (!/^\d{1,2}$/.test(String(number).trim())) return { valid: false, message: "번호는 숫자로 입력해주세요." };
  if (!name || !name.trim()) return { valid: false, message: "이름을 입력해주세요." };
  if (name.trim().length > 10) return { valid: false, message: "이름이 너무 깁니다." };
  return { valid: true };
}
function validateQuestion({ type, question, answer, choices, correctChoice }) {
  if (!question || !question.trim()) return { valid: false, message: "문제를 입력해주세요." };
  const q = question.trim();
  if (q.length < 5) return { valid: false, message: "문제가 너무 짧습니다. 최소 5자 이상 입력해주세요." };
  if (isSpecialCharOnly(q)) return { valid: false, message: "문제에 특수문자만 입력할 수 없습니다." };
  if (isRepeatedChar(q)) return { valid: false, message: "의미 없는 반복 문자는 사용할 수 없습니다." };
  if (containsBadWord(q)) return { valid: false, message: "문제에 부적절한 단어가 포함되어 있습니다." };
  if (!answer || !answer.trim()) return { valid: false, message: "답을 입력해주세요." };
  if (containsBadWord(answer)) return { valid: false, message: "답에 부적절한 단어가 포함되어 있습니다." };
  if (type === QUESTION_TYPES.MULTIPLE) {
    if (!choices || choices.length !== CHOICE_COUNT) return { valid: false, message: `보기를 ${CHOICE_COUNT}개 모두 입력해주세요.` };
    for (let i = 0; i < choices.length; i++) {
      if (!choices[i] || !choices[i].trim()) return { valid: false, message: `보기${i + 1}을 입력해주세요.` };
      if (containsBadWord(choices[i])) return { valid: false, message: `보기${i + 1}에 부적절한 단어가 포함되어 있습니다.` };
    }
    if (!correctChoice) return { valid: false, message: "정답 번호를 선택해주세요." };
  }
  return { valid: true };
}

/* ---------------- 랜덤 추첨 ---------------- */
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function pickRandomQuestions(pool, options) {
  const { count, scope = "all", scopeValue = "", typeMode = "ratio", multiplePercent = 70 } = options;
  let scoped = pool;
  if (scope === "class" && scopeValue) scoped = pool.filter((q) => q.class === scopeValue);
  else if (scope === "subject" && scopeValue) scoped = pool.filter((q) => q.subject === scopeValue);

  const multipleList = shuffle(scoped.filter((q) => q.type === QUESTION_TYPES.MULTIPLE));
  const essayList = shuffle(scoped.filter((q) => q.type === QUESTION_TYPES.ESSAY));

  let needMultiple = 0, needEssay = 0;
  if (typeMode === "multipleOnly") needMultiple = count;
  else if (typeMode === "essayOnly") needEssay = count;
  else { needMultiple = Math.round((count * multiplePercent) / 100); needEssay = count - needMultiple; }

  let takenMultiple = multipleList.slice(0, needMultiple);
  let takenEssay = essayList.slice(0, needEssay);
  let shortageMultiple = needMultiple - takenMultiple.length;
  let shortageEssay = needEssay - takenEssay.length;

  if (typeMode === "ratio") {
    if (shortageMultiple > 0) takenEssay = [...takenEssay, ...essayList.slice(takenEssay.length, takenEssay.length + shortageMultiple)];
    if (shortageEssay > 0) takenMultiple = [...takenMultiple, ...multipleList.slice(takenMultiple.length, takenMultiple.length + shortageEssay)];
  }
  const picked = shuffle([...takenMultiple, ...takenEssay]);
  return { picked, requested: count, shortage: picked.length < count };
}

/* ---------------- CSV 다운로드 ---------------- */
function exportQuestionsToCSV(questions, filename = "questions.csv") {
  const headers = ["반","번호","이름","과목","유형","문제","답","보기1","보기2","보기3","보기4","정답번호","작성시간","승인여부"];
  const escapeCSV = (value) => {
    if (value === null || value === undefined) return "";
    const str = String(value);
    if (str.includes(",") || str.includes("\n") || str.includes('"')) return `"${str.replace(/"/g, '""')}"`;
    return str;
  };
  const rows = questions.map((q) => {
    const choices = q.choices || [];
    const createdAt = q.createdAt?.toDate ? q.createdAt.toDate().toLocaleString("ko-KR") : "";
    return [q.class, q.number, q.name, q.subject, q.type, q.question, q.answer,
      choices[0] || "", choices[1] || "", choices[2] || "", choices[3] || "",
      q.correctChoice || "", createdAt, q.isApproved ? "승인" : "미승인"].map(escapeCSV);
  });
  const csvContent = "\uFEFF" + [headers.join(","), ...rows.map((r) => r.join(","))].join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

/* ---------------- 라우터 ---------------- */
const app = document.getElementById("app");
let cleanupFns = [];
function registerCleanup(fn) { cleanupFns.push(fn); }
function runCleanup() { cleanupFns.forEach((fn) => { try { fn(); } catch (e) {} }); cleanupFns = []; }

function getRoute() {
  const hash = location.hash.replace(/^#/, "") || "/";
  if (hash.startsWith("/admin")) return "admin";
  if (hash.startsWith("/goldenbell")) return "goldenbell";
  return "student";
}
function render() {
  runCleanup();
  const route = getRoute();
  document.body.className = route === "goldenbell" ? "page-goldenbell" : route === "admin" ? "page-admin" : "page-student";
  window.scrollTo(0, 0);
  if (route === "admin") renderAdminPage();
  else if (route === "goldenbell") renderGoldenBellPage();
  else renderStudentPage();
}
window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", render);

  let step = "info";
  let error = "";
  let submitting = false;
  let lastSubmitted = null;

  app.innerHTML = `<div class="center-screen"><div class="spinner spin"></div></div>`;

  const settingsRef = doc(db, COLLECTIONS.SETTINGS, "general");
  const unsub = onSnapshot(settingsRef, (snap) => {
    const isOpen = snap.exists() ? snap.data().isSubmissionOpen !== false : true;
    paint(isOpen);
  }, () => paint(true));
  registerCleanup(unsub);

  function paint(submissionOpen) {
    if (!submissionOpen) {
      app.innerHTML = `<div class="center-screen"><div class="fade-in" style="text-align:center;max-width:340px;">

        <p class="footer-sign">made by m00n</p>
      </div>`;
    paintDots();
    paintStep();
  }

  function paintDots() {
    const order = ["info", "question", "success"];
    const idx = order.indexOf(step);
    document.getElementById("dots").innerHTML = order.map((s, i) => {
      const cls = step === s ? "current" : i < idx ? "done" : "";
      return `<div class="dot ${cls}"></div>`;
    }).join("");
  }

  function paintStep() {
    const el = document.getElementById("step-container");
    if (step === "info") el.innerHTML = infoStepHTML();
    else if (step === "question") el.innerHTML = questionStepHTML();
    else el.innerHTML = successStepHTML();
    bindStepEvents();
  }

  function infoStepHTML() {
    return `
      <div class="fade-in" style="display:flex;flex-direction:column;gap:20px;">
        <div>
          <label class="label">반</label>
          <div class="grid3">
            ${CLASSES.map((c) => `<button type="button" class="pill-btn ${studentInfo.studentClass === c ? "active" : ""}" data-class="${c}">${c}</button>`).join("")}

        </div>
        <div>
          <label class="label">번호</label>
          <input class="input" type="number" inputmode="numeric" id="num-input" placeholder="번호를 입력하세요" value="${esc(studentInfo.number)}">
        </div>
        <div>
          <label class="label">이름</label>
          <input class="input" type="text" id="name-input" placeholder="이름을 입력하세요" value="${esc(studentInfo.name)}">
        </div>
        ${error ? `<p class="error-box">${esc(error)}</p>` : ""}
        <button class="btn btn-gold" id="next-btn" style="width:100%;">다음</button>
      </div>`;
  }

  function questionStepHTML() {
    const isMultiple = draft.type === QUESTION_TYPES.MULTIPLE;
    return `
      <div class="fade-in" style="display:flex;flex-direction:column;gap:20px;">
        <div>
          <label class="label">과목</label>
          <div class="grid4">
            ${SUBJECTS.map((s) => `<button type="button" class="pill-btn subj-btn ${draft.subject === s ? "active" : ""}" data-subject="${s}">${s}</button>`).join("")}
          </div>
        </div>
        <div>
          <label class="label">문제 유형</label>
          <div class="grid3" style="grid-template-columns:1fr 1fr;">
            ${Object.values(QUESTION_TYPES).map((t) => `
              <label class="pill-btn type-radio ${draft.type === t ? "active" : ""}" style="display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">
                <input type="radio" name="qtype" value="${t}" ${draft.type === t ? "checked" : ""} style="accent-color:var(--gold);">
                ${t}
              </label>`).join("")}
          </div>
        </div>
        <div>
          <label class="label">문제</label>
          <textarea class="input" id="q-input" rows="4" placeholder="문제를 입력하세요" style="resize:vertical;">${esc(draft.question)}</textarea>
        </div>
        ${isMultiple ? `
        <div>
          <label class="label">보기</label>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${Array.from({ length: CHOICE_COUNT }).map((_, i) => `
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="choice-idx">${i + 1}</span>
                <input class="input choice-input" data-idx="${i}" type="text" placeholder="보기 ${i + 1}" value="${esc(draft.choices[i] || "")}">
              </div>`).join("")}
          </div>
          <label class="label" style="margin-top:12px;">정답 번호</label>
          <div class="grid4">
            ${Array.from({ length: CHOICE_COUNT }).map((_, i) => `<button type="button" class="pill-btn correct-btn ${draft.correctChoice === String(i + 1) ? "active" : ""}" data-idx="${i + 1}">${i + 1}</button>`).join("")}
          </div>
        </div>` : ""}
        <div>
          <label class="label">${isMultiple ? "정답 (텍스트)" : "모범 답안"}</label>
          <textarea class="input" id="a-input" rows="${isMultiple ? 2 : 3}" placeholder="${isMultiple ? "정답 내용을 입력하세요" : "모범 답안을 입력하세요"}" style="resize:vertical;">${esc(draft.answer)}</textarea>
        </div>
        ${error ? `<p class="error-box fade-in">${esc(error)}</p>` : ""}

          <p>문제 미리보기: <b style="color:var(--ink);">${esc(lastSubmitted.questionPreview)}...</b></p>
        </div>
        <button class="btn btn-gold" id="another-btn" style="width:100%;margin-top:22px;">다른 과목 문제 추가로 제출하기</button>
      </div>`;
  }

  function bindStepEvents() {
    if (step === "info") {
      document.querySelectorAll("[data-class]").forEach((b) => b.onclick = () => {
        studentInfo.studentClass = b.dataset.class; saveJSON(STORAGE_KEYS.STUDENT_INFO, studentInfo);
        document.querySelectorAll("[data-class]").forEach((x) => x.classList.toggle("active", x === b));
      });
      document.getElementById("num-input").oninput = (e) => { studentInfo.number = e.target.value; saveJSON(STORAGE_KEYS.STUDENT_INFO, studentInfo); };
      document.getElementById("name-input").oninput = (e) => { studentInfo.name = e.target.value; saveJSON(STORAGE_KEYS.STUDENT_INFO, studentInfo); };
      document.getElementById("next-btn").onclick = () => {
        const result = validateStudentInfo(studentInfo);
        if (!result.valid) { error = result.message; paintStep(); return; }
        error = ""; step = "question"; paintDots(); paintStep();
      };
    } else if (step === "question") {
      document.querySelectorAll(".subj-btn").forEach((b) => b.onclick = () => {
        draft.subject = b.dataset.subject; saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft);
        document.querySelectorAll(".subj-btn").forEach((x) => x.classList.toggle("active", x === b));
      });
      document.querySelectorAll('input[name="qtype"]').forEach((r) => r.onchange = () => {
        draft.type = r.value; draft.choices = ["", "", "", ""]; draft.correctChoice = "";
        saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft); error = ""; paintStep();
      });
      document.getElementById("q-input").oninput = (e) => { draft.question = e.target.value; saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft); };
      document.getElementById("a-input").oninput = (e) => { draft.answer = e.target.value; saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft); };
      document.querySelectorAll(".choice-input").forEach((inp) => inp.oninput = (e) => {
        draft.choices[Number(inp.dataset.idx)] = e.target.value; saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft);
      });
      document.querySelectorAll(".correct-btn").forEach((b) => b.onclick = () => {
        draft.correctChoice = b.dataset.idx; saveJSON(STORAGE_KEYS.STUDENT_DRAFT, draft);
        document.querySelectorAll(".correct-btn").forEach((x) => x.classList.toggle("active", x === b));
      });
      document.getElementById("prev-btn").onclick = () => { step = "info"; paintDots(); paintStep(); };
      document.getElementById("submit-btn").onclick = handleSubmit;
    } else if (step === "success") {
      document.getElementById("another-btn").onclick = () => { step = "question"; error = ""; paintDots(); paintStep(); };
    }
  }

  function getSubmittedKey({ studentClass, number, name, subject }) {
    return `${studentClass}-${number}-${name.trim()}-${subject}`;
  }

  async function handleSubmit() {
    if (submitting) return;
    if (!draft.subject) { error = "과목을 선택해주세요."; paintStep(); return; }
    const result = validateQuestion(draft);
    if (!result.valid) { error = result.message; paintStep(); return; }

    const submittedKey = getSubmittedKey({ ...studentInfo, subject: draft.subject });
    let submittedList = [];
    try { submittedList = JSON.parse(localStorage.getItem(SUBMITTED_KEY) || "[]"); } catch (e) { submittedList = []; }
    if (submittedList.includes(submittedKey)) { error = `이미 ${draft.subject} 과목의 문제를 제출했습니다.`; paintStep(); return; }

    submitting = true; error = ""; paintStep();
    try {
      await addDoc(collection(db, COLLECTIONS.QUESTIONS), {
        class: studentInfo.studentClass, number: studentInfo.number, name: studentInfo.name.trim(),
        subject: draft.subject, type: draft.type, question: draft.question.trim(), answer: draft.answer.trim(),
        choices: draft.type === QUESTION_TYPES.MULTIPLE ? draft.choices : [],
        correctChoice: draft.type === QUESTION_TYPES.MULTIPLE ? draft.correctChoice : "",
        createdAt: serverTimestamp(), isApproved: false, isDeleted: false,
      });
      submittedList.push(submittedKey);
      localStorage.setItem(SUBMITTED_KEY, JSON.stringify(submittedList));
      lastSubmitted = { subject: draft.subject, questionPreview: draft.question.trim().slice(0, 30), submittedAt: new Date() };
      removeKey(STORAGE_KEYS.STUDENT_DRAFT);
      draft = emptyQuestion();
      step = "success";
      paintDots(); paintStep();
    } catch (err) {
      console.error("Firestore 저장 오류:", err);
      error = "제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
      paintStep();
    } finally {
      submitting = false;
    }
  }
}

/* =========================================================================
   골든벨 진행 화면
   ========================================================================= */
function playBeep() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.6);
  } catch (err) { console.warn("효과음 재생 실패:", err); }
}
function timerHTML(totalSeconds, remainingSeconds) {
  if (totalSeconds === null || totalSeconds === undefined) return `<div class="timer-none">⏱ 제한 없음</div>`;
  const radius = 34, circumference = 2 * Math.PI * radius;
  const ratio = Math.max(0, Math.min(1, remainingSeconds / totalSeconds));
  const offset = circumference * (1 - ratio);
  const isUrgent = remainingSeconds <= 5 && remainingSeconds > 0;
  const isDone = remainingSeconds <= 0;
  const stroke = isDone ? "#DD4B3E" : isUrgent ? "#F0A93D" : "#E8B923";
  return `<div class="timer-wrap">
    <svg viewBox="0 0 80 80" class="timer-svg">
      <circle cx="40" cy="40" r="${radius}" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/>
      <circle cx="40" cy="40" r="${radius}" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s linear, stroke .3s;"/>
    </svg>
    <div class="timer-value ${isUrgent ? "urgent" : ""}">${Math.max(0, remainingSeconds)}</div>
  </div>`;
}
function authorText(question, revealMode, answerRevealed) {
  switch (revealMode) {
    case REVEAL_MODES.FULL_NAME: return `${question.name} (${question.class} ${question.number}번)`;
    case REVEAL_MODES.NAME_ONLY: return question.name;
    case REVEAL_MODES.ANONYMOUS: return `${question.class} ${question.number}번 학생`;
    case REVEAL_MODES.AFTER_ANSWER: return answerRevealed ? `${question.name} (${question.class} ${question.number}번)` : null;
    default: return `${question.class} ${question.number}번 학생`;
  }
}

function renderGoldenBellPage() {
  let quizData = loadSession(ACTIVE_QUIZ_KEY, null);
  let index = 0, revealed = false, finished = false, showSettings = false, timeLeft = null, isFullscreen = !!document.fullscreenElement;
  let timerInterval = null, hasBeeped = false;

  registerCleanup(() => { if (timerInterval) clearInterval(timerInterval); });

  const questions = quizData?.questions || [];
  if (!quizData || questions.length === 0) {
    app.innerHTML = `
      <div class="gb-empty">
        <div>
          <p style="font-size:17px;font-weight:700;margin-bottom:16px;">추첨된 문제 세트가 없습니다.</p>
          <a href="#/admin" class="btn btn-gold" style="display:inline-block;">관리자 화면에서 먼저 추첨해주세요</a>
        </div>
      </div>`;
    return;
  }

  function getSettings() { return quizData.settings || { revealMode: "익명", timerSeconds: null, autoAdvanceOnTimeout: false }; }

  function updateSettings(newSettings) {
    quizData = { ...quizData, settings: newSettings };
    saveSession(ACTIVE_QUIZ_KEY, quizData);
    resetTimerForCurrentQuestion();
    paintTopbar();
  }

  function resetTimerForCurrentQuestion() {
    hasBeeped = false;
    revealed = false;
    const settings = getSettings();
    timeLeft = settings.timerSeconds;
    if (timerInterval) clearInterval(timerInterval);
    if (settings.timerSeconds !== null && settings.timerSeconds !== undefined && !finished) {
      timerInterval = setInterval(() => {
        if (timeLeft === null) return;
        if (timeLeft <= 1) {
          timeLeft = 0;
          if (!hasBeeped) {
            hasBeeped = true;
            playBeep();
            if (settings.autoAdvanceOnTimeout) setTimeout(() => goNext(), 800);
          }
        } else timeLeft -= 1;
        paintTimer();
      }, 1000);
    }
  }

  function goNext() {
    if (index >= questions.length - 1) { finished = true; paintAll(); return; }
    index += 1; resetTimerForCurrentQuestion(); paintAll();
  }
  function goPrev() { index = Math.max(0, index - 1); resetTimerForCurrentQuestion(); paintAll(); }

  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
  const fsHandler = () => { isFullscreen = !!document.fullscreenElement; paintTopbar(); };
  document.addEventListener("fullscreenchange", fsHandler);
  registerCleanup(() => document.removeEventListener("fullscreenchange", fsHandler));

  function paintAll() {
    if (finished) { paintSummary(); return; }
    const settings = getSettings();
    const q = questions[index];
    const isMultiple = q.type === QUESTION_TYPES.MULTIPLE;
    const isLast = index === questions.length - 1;
    app.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;">
        <div class="gb-topbar" id="gb-topbar"></div>
        <div class="gb-body" id="gb-question-area"></div>
        <div class="gb-bottombar">
          <button class="gb-nav-btn" id="prev-q-btn" ${index === 0 ? "disabled" : ""}>← 이전 문제</button>
          <button class="gb-nav-btn" id="skip-q-btn">문제 건너뛰기</button>
          ${isLast
            ? `<button class="gb-nav-btn" id="finish-btn" style="background:var(--red);">🏁 골든벨 종료</button>`
            : `<button class="gb-nav-btn" id="next-q-btn" style="background:var(--gold);color:#3a2c02;">다음 문제 →</button>`}
        </div>
      </div>`;
    paintTopbar();
    paintQuestionArea();
    document.getElementById("prev-q-btn").onclick = goPrev;
    document.getElementById("skip-q-btn").onclick = goNext;
    const nextBtn = document.getElementById("next-q-btn");
    if (nextBtn) nextBtn.onclick = goNext;
    const finishBtn = document.getElementById("finish-btn");
    if (finishBtn) finishBtn.onclick = () => { finished = true; paintAll(); };
  }

  function paintTopbar() {
    const settings = getSettings();
    const q = questions[index];
    const percent = questions.length > 0 ? ((index + 1) / questions.length) * 100 : 0;
    document.getElementById("gb-topbar").innerHTML = `
      <div class="gb-progress">
        <span style="font-weight:700;white-space:nowrap;">${index + 1} / ${questions.length}</span>
        <div class="gb-progress-track"><div class="gb-progress-fill" style="width:${percent}%;"></div></div>
      </div>
      <div class="gb-subject-chip">${esc(q.subject)}</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="gb-timer">${timerHTML(settings.timerSeconds, timeLeft ?? 0)}</span>
        <button class="gb-icon-btn" id="settings-toggle-btn" title="설정">⚙️</button>
        <button class="gb-icon-btn" id="fullscreen-btn" title="전체 화면 (ESC로 종료)">${isFullscreen ? "⤡" : "⤢"}</button>
      </div>
      ${showSettings ? settingsPanelHTML(settings) : ""}`;
    document.getElementById("settings-toggle-btn").onclick = () => { showSettings = !showSettings; paintTopbar(); };
    document.getElementById("fullscreen-btn").onclick = toggleFullscreen;
    if (showSettings) bindSettingsPanel(settings);
  }

  function paintTimer() {
    const settings = getSettings();
    const el = document.getElementById("gb-timer");
    if (el) el.innerHTML = timerHTML(settings.timerSeconds, timeLeft ?? 0);
  }

  function settingsPanelHTML(settings) {
    return `
      <div class="gb-settings-panel fade-in">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <p style="font-weight:800;font-size:14px;margin:0;">골든벨 설정</p>
          <button id="close-settings-btn" style="background:none;color:rgba(255,255,255,.6);font-size:13px;">닫기</button>
        </div>
        <div style="margin-bottom:12px;">
          <p style="font-size:11px;color:rgba(255,255,255,.5);margin:0 0 6px;">출제자 공개 방식</p>
          <select id="reveal-mode-select" style="width:100%;padding:9px;border-radius:10px;background:#2E3346;color:#fff;border:1px solid var(--navy-line);">
            ${Object.values(REVEAL_MODES).map((m) => `<option value="${m}" ${settings.revealMode === m ? "selected" : ""}>${m}</option>`).join("")}
          </select>
        </div>
        <div style="margin-bottom:12px;">
          <p style="font-size:11px;color:rgba(255,255,255,.5);margin:0 0 6px;">타이머</p>
          <select id="timer-select" style="width:100%;padding:9px;border-radius:10px;background:#2E3346;color:#fff;border:1px solid var(--navy-line);">
            ${TIMER_OPTIONS.map((opt) => `<option value="${opt.value === null ? "null" : opt.value}" ${settings.timerSeconds === opt.value ? "selected" : ""}>${opt.label}</option>`).join("")}
          </select>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#ddd;">
          <input type="checkbox" id="auto-advance-check" ${settings.autoAdvanceOnTimeout ? "checked" : ""} style="accent-color:var(--gold);width:16px;height:16px;">
          시간 종료 시 자동으로 다음 문제로 이동
        </label>
      </div>`;
  }
  function bindSettingsPanel(settings) {
    document.getElementById("close-settings-btn").onclick = () => { showSettings = false; paintTopbar(); };
    document.getElementById("reveal-mode-select").onchange = (e) => updateSettings({ ...settings, revealMode: e.target.value });
    document.getElementById("timer-select").onchange = (e) => {
      const v = e.target.value;
      updateSettings({ ...settings, timerSeconds: v === "null" ? null : Number(v) });
    };
    document.getElementById("auto-advance-check").onchange = (e) => updateSettings({ ...settings, autoAdvanceOnTimeout: e.target.checked });
  }

  function paintQuestionArea() {
    const settings = getSettings();
    const q = questions[index];
    const isMultiple = q.type === QUESTION_TYPES.MULTIPLE;
    const authorLine = authorText(q, settings.revealMode, revealed);
    document.getElementById("gb-question-area").innerHTML = `
      <div class="fade-in" style="width:100%;display:flex;flex-direction:column;align-items:center;">
        <p class="gb-qnum">문제 ${index + 1}</p>
        <p class="gb-question">${esc(q.question)}</p>
        ${isMultiple ? `
        <div class="gb-choices">
          ${(q.choices || []).map((c, i) => `
            <div class="gb-choice ${revealed && String(i + 1) === q.correctChoice ? "correct pop" : ""}">
              <span class="gb-choice-idx">${i + 1}</span>${esc(c)}
            </div>`).join("")}
        </div>` : ""}
        ${!revealed
          ? `<button class="gb-reveal-btn" id="reveal-btn">정답 보기</button>`
          : `<div class="gb-answer-card reveal">
               <p class="gb-answer-label">정답</p>
               ${isMultiple
                 ? `<p class="gb-answer-text">${esc(q.correctChoice)}번 &nbsp; <span style="font-size:18px;font-weight:600;">${esc((q.choices || [])[Number(q.correctChoice) - 1] || "")}</span></p>`
                 : `<p class="gb-answer-text">${esc(q.answer)}</p>`}
             </div>`}
        <div class="gb-author">${authorLine ? `출제자: <b>${esc(authorLine)}</b>` : "🙈 출제자는 정답 공개 후 표시됩니다"}</div>
      </div>`;
    const revealBtn = document.getElementById("reveal-btn");
    if (revealBtn) revealBtn.onclick = () => { revealed = true; paintQuestionArea(); };
  }

  function paintSummary() {
    if (timerInterval) clearInterval(timerInterval);
    const qs = quizData.questions;
    const subjectsUsed = [...new Set(qs.map((q) => q.subject))];
    const studentMap = new Map();
    qs.forEach((q) => { const key = `${q.class}-${q.number}-${q.name}`; if (!studentMap.has(key)) studentMap.set(key, q); });
    const students = [...studentMap.values()];
    const byClass = CLASSES.map((c) => ({ label: c, value: qs.filter((q) => q.class === c).length })).filter((d) => d.value > 0);
    const bySubject = SUBJECTS.map((s) => ({ label: s, value: qs.filter((q) => q.subject === s).length })).filter((d) => d.value > 0);

    app.innerHTML = `
      <div class="gb-summary">
        <div class="fade-in" style="max-width:680px;width:100%;">
          <div style="font-size:48px;margin-bottom:12px;">🏆</div>
          <h1 style="font-family:var(--font-display);font-size:clamp(24px,4vw,32px);margin-bottom:26px;">골든벨이 종료되었습니다!</h1>
          <div class="gb-summary-grid">
            <div class="gb-summary-box"><p style="color:rgba(255,255,255,.5);font-size:13px;margin:0;">총 문제 수</p><p style="font-size:24px;font-weight:800;margin:4px 0 0;">${qs.length}</p></div>
            <div class="gb-summary-box"><p style="color:rgba(255,255,255,.5);font-size:13px;margin:0;">출제 학생 수</p><p style="font-size:24px;font-weight:800;margin:4px 0 0;">${students.length}</p></div>
          </div>
          <div class="gb-summary-detail">
            <div class="gb-summary-box"><p style="font-weight:700;font-size:13px;margin:0 0 8px;color:#ddd;">사용한 과목</p><p style="font-size:13px;color:rgba(255,255,255,.6);margin:0;">${esc(subjectsUsed.join(", "))}</p></div>
            <div class="gb-summary-box"><p style="font-weight:700;font-size:13px;margin:0 0 8px;color:#ddd;">출제 학생 목록</p><p style="font-size:13px;color:rgba(255,255,255,.6);margin:0;max-height:96px;overflow-y:auto;">${esc(students.map((s) => `${s.name}(${s.class} ${s.number}번)`).join(", "))}</p></div>
            <div class="gb-summary-box"><p style="font-weight:700;font-size:13px;margin:0 0 8px;color:#ddd;">반별 출제 수</p>${byClass.map((d) => `<p style="font-size:13px;color:rgba(255,255,255,.6);margin:0;">${d.label}: ${d.value}문제</p>`).join("")}</div>
            <div class="gb-summary-box"><p style="font-weight:700;font-size:13px;margin:0 0 8px;color:#ddd;">과목별 출제 수</p>${bySubject.map((d) => `<p style="font-size:13px;color:rgba(255,255,255,.6);margin:0;">${d.label}: ${d.value}문제</p>`).join("")}</div>
          </div>
          <button class="btn btn-gold" id="back-to-admin-btn" style="margin-top:28px;padding:15px 30px;">관리자 화면으로 돌아가기</button>
        </div>
      </div>`;
    document.getElementById("back-to-admin-btn").onclick = () => { sessionStorage.removeItem(ACTIVE_QUIZ_KEY); location.hash = "/admin"; };
  }

  resetTimerForCurrentQuestion();
  paintAll();
}
</script>
</body>
</html>
